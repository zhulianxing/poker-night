# Poker Night Nginx Configuration
# HTTPS + WSS Proxy for Multi-Service Architecture

# Upstream definitions
upstream poker-api {
    server 127.0.0.1:3010;
    keepalive 32;
}

upstream poker-socket {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream poker-merchant {
    server 127.0.0.1:3003;
    keepalive 16;
}

upstream poker-payment {
    server 127.0.0.1:3002;
    keepalive 16;
}

# HTTP Server (redirect to HTTPS in production)
server {
    listen 80;
    server_name 43.164.130.145;
    
    # Redirect HTTP to HTTPS (uncomment when SSL is configured)
    # return 301 https://$server_name$request_uri;
    
    # Root directory for static files
    root /opt/poker-night/public;
    
    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
    
    # API Gateway - REST API
    location /api/ {
        proxy_pass http://poker-api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # WebSocket - Socket.IO
    location /ws/ {
        proxy_pass http://poker-socket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    
    # Socket.IO fallback (for polling transport)
    location /socket.io/ {
        proxy_pass http://poker-socket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # Merchant API
    location /merchant/ {
        proxy_pass http://poker-merchant;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
    }
    
    # Payment API
    location /payment/ {
        proxy_pass http://poker-payment;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
    }
    
    # APK Downloads
    location /apk/ {
        alias /opt/poker-night/public/apk/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }
    
    # Admin Dashboard
    location /admin/ {
        alias /opt/poker-night/public/admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }
    
    # Merchant Dashboard
    location /merchant-dashboard/ {
        alias /opt/poker-night/public/merchant/;
        index index.html;
        try_files $uri $uri/ /merchant-dashboard/index.html;
    }
    
    # Static files & Download page
    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

