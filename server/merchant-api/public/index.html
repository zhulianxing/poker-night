<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Night 管理后台</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --card: #1a1a1a;
    --text: #e0e0e0;
    --text-muted: #888;
    --gold: #FFD700;
    --border: #333;
    --radius: 8px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-image: radial-gradient(circle at 50% 30%, rgba(255,215,0,0.06) 0%, transparent 60%);
  }
  .container { text-align: center; max-width: 500px; padding: 40px 24px; }
  h1 { color: var(--gold); font-size: 28px; letter-spacing: 3px; margin-bottom: 8px; }
  .subtitle { color: var(--text-muted); font-size: 13px; margin-bottom: 40px; letter-spacing: 1px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: rgba(255,215,0,0.3); }
  .card h2 { font-size: 18px; margin-bottom: 8px; }
  .card p { color: var(--text-muted); font-size: 13px; margin-bottom: 20px; }
  .btn {
    display: inline-block;
    padding: 12px 32px;
    border-radius: var(--radius);
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .btn-gold { background: var(--gold); color: #000; }
  .btn-gold:hover { background: #ffdf3f; }
  .btn-outline { border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: rgba(255,215,0,0.3); color: var(--gold); }
  .footer { margin-top: 32px; font-size: 12px; color: var(--text-muted); }
  .badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(255,215,0,0.12);
    color: var(--gold);
    margin-left: 6px;
    vertical-align: middle;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>♠️ POKER NIGHT</h1>
  <p class="subtitle">德州扑克之夜 · 管理系统</p>

  <div class="card">
    <h2>🏪 商户后台</h2>
    <p>数据看板 · 订单管理 · 设备管理 · 结算提现</p>
    <a href="/merchant-dashboard/login.html" class="btn btn-gold">进入商户后台</a>
  </div>

  <div class="card">
    <h2>⚙️ 运营后台 <span class="badge">ADMIN</span></h2>
    <p>场馆管理 · 全局订单 · 设备绑定 · 平台退款</p>
    <a href="/admin-dashboard/admin-login.html" class="btn btn-outline">进入运营后台</a>
  </div>

  <div class="footer">
    <p>API 状态: <span id="apiStatus">检测中...</span></p>
    <p style="margin-top:4px;">Poker Night v2.0 · 商户/运营后台</p>
  </div>
</div>
<script>
fetch('/health').then(r=>r.json()).then(d=>{
  document.getElementById('apiStatus').textContent = '✅ ' + (d.service || '在线');
}).catch(()=>{
  document.getElementById('apiStatus').textContent = '❌ 离线';
});
</script>
</body>
</html>
