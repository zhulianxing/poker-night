<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poker Night · 运营后台</title>
  <link rel="stylesheet" href="../merchant-dashboard/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♠️</text></svg>">
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <h1>⚙️ POKER NIGHT</h1>
      <p>运营管理后台</p>
    </div>
    <form id="adminLoginForm">
      <div class="form-group">
        <label>管理员账号 / 邮箱</label>
        <input type="text" id="username" placeholder="请输入账号或邮箱" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" required>
      </div>
      <button type="submit" class="btn btn-gold btn-block" id="loginBtn">登 录</button>
    </form>
  </div>
</div>

<script>
  const token = localStorage.getItem('pn_admin_token');
  if (token) window.location.href = 'dashboard.html';

  document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) return;

    btn.disabled = true;
    btn.textContent = '登录中...';

    try {
      // /merchant/api/v1/admin/login → /api/v1/admin/login
      const res = await fetch('/merchant/api/v1/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email: username, password })
      });

      const data = await res.json();

      if (res.ok && data.token) {
        localStorage.setItem('pn_admin_token', data.token);
        localStorage.setItem('pn_admin_info', JSON.stringify(data.admin || {}));
        window.location.href = 'dashboard.html';
      } else {
        showToast(data.error || data.message || '登录失败', 'error');
        btn.disabled = false;
        btn.textContent = '登 录';
      }
    } catch (err) {
      showToast('网络错误，请稍后重试', 'error');
      btn.disabled = false;
      btn.textContent = '登 录';
    }
  });

  function showToast(msg, type) {
    const container = document.createElement('div');
    container.className = 'toast-container';
    document.body.appendChild(container);
    const toast = document.createElement('div');
    toast.className = 'toast ' + (type || '');
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => { toast.remove(); container.remove(); }, 3000);
  }
</script>

</body>
</html>
